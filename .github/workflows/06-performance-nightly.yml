name: Performance Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "23 5 * * *"

permissions:
  contents: read

concurrency:
  group: performance-nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  performance:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6 # ALLOW_VERSION_TAGS_DURING_BOOTSTRAP
      - uses: dtolnay/rust-toolchain@stable # ALLOW_VERSION_TAGS_DURING_BOOTSTRAP
      - run: bash scripts/perf_smoke.sh
      - run: bash scripts/toolchain_experiment_smoke.sh
      - uses: actions/upload-artifact@v7 # ALLOW_VERSION_TAGS_DURING_BOOTSTRAP
        with:
          name: performance-frontier-reports
          path: artifacts/perf/**
          if-no-files-found: warn
          retention-days: 14
