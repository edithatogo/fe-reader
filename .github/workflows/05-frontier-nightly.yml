name: Frontier Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "41 4 * * *"

permissions:
  contents: read

concurrency:
  group: frontier-nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  frontier:
    strategy:
      fail-fast: false
      matrix:
        toolchain: [beta, nightly]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4 # ALLOW_VERSION_TAGS_DURING_BOOTSTRAP
      - run: rustup toolchain install ${{ matrix.toolchain }} --profile minimal
      - run: cargo +${{ matrix.toolchain }} check --workspace --all-targets
      - run: bash scripts/miri_smoke.sh
      - run: bash scripts/sanitizer_smoke.sh
      - run: bash scripts/fuzz_smoke.sh
      - run: bash scripts/gpu_frontier_smoke.sh
      - run: bash scripts/differential_oracle_smoke.sh
