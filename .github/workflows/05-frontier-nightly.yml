name: Frontier Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "41 4 * * *"

permissions:
  contents: read

concurrency:
  group: frontier-nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  frontier:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4 # ALLOW_VERSION_TAGS_DURING_BOOTSTRAP
      - uses: dtolnay/rust-toolchain@nightly # ALLOW_VERSION_TAGS_DURING_BOOTSTRAP
      - run: cargo test --workspace --all-targets
      - run: bash scripts/differential_oracle_smoke.sh
