name: Cross Platform Smoke

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: cross-platform-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4 # ALLOW_VERSION_TAGS_DURING_BOOTSTRAP
      - uses: dtolnay/rust-toolchain@stable # ALLOW_VERSION_TAGS_DURING_BOOTSTRAP
      - run: cargo metadata --format-version=1
      - run: cargo test -p fe_reader_core -p fe_reader_pdf_model -p fe_reader_security -p fe_reader_cli
      - run: cargo run -p fe_reader_cli -- doctor
