name: Release

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: Release evidence identifier.
        required: true
        default: dev-smoke
      channel:
        description: Release channel.
        required: true
        default: dev

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FE_RELEASE_ID: ${{ inputs.release_id }}
      FE_RELEASE_CHANNEL: ${{ inputs.channel }}
    steps:
      - uses: actions/checkout@v4 # ALLOW_VERSION_TAGS_DURING_BOOTSTRAP
      - uses: actions/setup-python@v5 # ALLOW_VERSION_TAGS_DURING_BOOTSTRAP
        with:
          python-version: "3.x"
      - run: bash scripts/sbom_audit.sh
      - run: bash scripts/generate_provenance_attestation.sh
      - run: bash scripts/signing_readiness_check.sh
      - run: bash scripts/release_evidence_check.sh
      - run: python3 scripts/release_provenance_check.py
      - run: python3 scripts/release_matrix_check.py
      - run: bash scripts/release_readiness_check.sh
      - uses: actions/upload-artifact@v4 # ALLOW_VERSION_TAGS_DURING_BOOTSTRAP
        with:
          name: release-evidence
          path: target/release-evidence/**
          if-no-files-found: error
          retention-days: 30
