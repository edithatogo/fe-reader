name: Release

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: Release evidence identifier.
        required: true
        default: dev-smoke
      channel:
        description: Release channel.
        required: true
        default: dev
      target_platforms:
        description: Comma-separated release signing targets. Use all only when every platform credential is available.
        required: true
        default: linux,android

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FE_RELEASE_ID: ${{ inputs.release_id }}
      FE_RELEASE_CHANNEL: ${{ inputs.channel }}
      FE_RELEASE_TARGETS: ${{ inputs.target_platforms }}
      FE_WINDOWS_SIGNING_CERT: ${{ secrets.FE_WINDOWS_SIGNING_CERT }}
      FE_WINDOWS_SIGNING_PASSWORD: ${{ secrets.FE_WINDOWS_SIGNING_PASSWORD }}
      FE_MACOS_DEVELOPER_ID_CERT: ${{ secrets.FE_MACOS_DEVELOPER_ID_CERT }}
      FE_MACOS_NOTARY_PROFILE: ${{ secrets.FE_MACOS_NOTARY_PROFILE }}
      FE_LINUX_SIGNING_KEY: ${{ secrets.FE_LINUX_SIGNING_KEY }}
      FE_ANDROID_UPLOAD_KEYSTORE: ${{ secrets.FE_ANDROID_UPLOAD_KEYSTORE }}
      FE_ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.FE_ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
      FE_IOS_DISTRIBUTION_CERT: ${{ secrets.FE_IOS_DISTRIBUTION_CERT }}
      FE_IOS_APPSTORE_CONNECT_KEY: ${{ secrets.FE_IOS_APPSTORE_CONNECT_KEY }}
    steps:
      - uses: actions/checkout@v6 # ALLOW_VERSION_TAGS_DURING_BOOTSTRAP
      - uses: actions/setup-python@v6 # ALLOW_VERSION_TAGS_DURING_BOOTSTRAP
        with:
          python-version: "3.x"
      - run: bash scripts/sbom_audit.sh
      - run: bash scripts/generate_provenance_attestation.sh
      - run: bash scripts/signing_readiness_check.sh
      - run: bash scripts/release_evidence_check.sh
      - run: python3 scripts/release_provenance_check.py
      - run: python3 scripts/release_matrix_check.py
      - run: bash scripts/release_readiness_check.sh
      - uses: actions/upload-artifact@v7 # ALLOW_VERSION_TAGS_DURING_BOOTSTRAP
        with:
          name: release-evidence
          path: target/release-evidence/**
          if-no-files-found: error
          retention-days: 30
