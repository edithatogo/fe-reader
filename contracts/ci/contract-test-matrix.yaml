version: 0.9
matrix:
  architecture:
    command: python3 scripts/strict_contract_check.py
    gate: P0
  strict_mutation_contract:
    command: python3 scripts/strict_mutation_contract_check.py
    gate: P0
  repository_ci_cd:
    command: python3 scripts/repository_ci_cd_check.py
    gate: P0
  frontier_ci_policy:
    command: python3 scripts/frontier_ci_check.py
    gate: P0
  schemas:
    command: python3 scripts/validate_schemas.py
    gate: P0
  operation_intent_contract:
    command: python3 scripts/operation_intent_contract_check.py
    gate: P0
  wave0_acceptance:
    command: python3 scripts/wave0_acceptance_check.py
    gate: P0
  security_policy:
    command: bash scripts/security_policy_check.sh
    gate: P0
  rust_stable:
    command: cargo test --workspace --all-targets
    gate: P0
  clippy:
    command: cargo clippy --workspace --all-targets --all-features -- -D warnings
    gate: P0
  public_api:
    command: scripts/public_api_snapshot_check.sh
    gate: P1_after_api_baseline
  c_abi:
    command: scripts/c_abi_snapshot_check.sh
    gate: P1_after_api_baseline
  nuget_wrapper_advisory:
    command: scripts/nuget_wrapper_check.sh
    gate: advisory_until_package_baseline
    blocks_pr: false
    promotion_requires_adr: true
    baseline_required: true
    baseline_artifact: contracts/snapshots/dotnet/FeReader.Native.facade.json
  mobile_smoke_bindings_advisory:
    command: python3 scripts/mobile_smoke_bindings_check.py
    gate: advisory_until_mobile_baseline
    blocks_pr: false
    promotion_requires_adr: true
    baseline_required: true
    baseline_artifact: contracts/snapshots/mobile/FeReader.MobileSmoke.facade.json
  semver:
    command: scripts/semver_check.sh
    gate: release
  release_evidence:
    command: bash scripts/release_evidence_check.sh
    gate: P0_for_release
  release_matrix:
    command: python3 scripts/release_matrix_check.py
    gate: P0_for_release
  release_readiness:
    command: bash scripts/release_readiness_check.sh
    gate: P0_for_release
  sbom_audit:
    command: bash scripts/sbom_audit.sh
    gate: P0_for_public_release
  release_provenance:
    command: bash scripts/generate_provenance_attestation.sh
    gate: P0_for_public_release
  signing_readiness:
    command: bash scripts/signing_readiness_check.sh
    gate: P0_for_public_release
  release_provenance_policy:
    command: python3 scripts/release_provenance_check.py
    gate: P0_for_release
  supply_chain:
    command: scripts/supply_chain_gate.sh
    gate: P0_for_release_P1_for_pr
  actions_security:
    command: scripts/actions_security_gate.sh
    gate: P0
  performance_smoke_advisory:
    command: bash scripts/perf_smoke.sh
    gate: advisory_until_budget_baseline
    blocks_pr: false
    promotion_requires_adr: true
    baseline_required: true
    baseline_artifact: benchmarks/budgets/performance-budgets.yaml
  frontier_miri:
    command: bash scripts/miri_smoke.sh
    gate: advisory_frontier
    blocks_pr: false
    promotion_requires_adr: true
    baseline_required: true
    baseline_artifact: target/frontier-reports/miri-smoke.json
  frontier_sanitizers:
    command: bash scripts/sanitizer_smoke.sh
    gate: advisory_frontier
    blocks_pr: false
    promotion_requires_adr: true
    baseline_required: true
    baseline_artifact: target/frontier-reports/sanitizer-smoke.json
  frontier_fuzz:
    command: bash scripts/fuzz_smoke.sh
    gate: advisory_frontier
    blocks_pr: false
    promotion_requires_adr: true
    baseline_required: true
    baseline_artifact: target/frontier-reports/fuzz-smoke.json
  frontier_gpu:
    command: bash scripts/gpu_frontier_smoke.sh
    gate: advisory_frontier
    blocks_pr: false
    promotion_requires_adr: true
    baseline_required: true
    baseline_artifact: target/frontier-reports/gpu-frontier-smoke.json
  frontier_toolchain_experiments:
    command: bash scripts/toolchain_experiment_smoke.sh
    gate: advisory_frontier
    blocks_pr: false
    promotion_requires_adr: true
    baseline_required: true
    baseline_artifact: target/frontier-reports/toolchain-experiment-smoke.json
