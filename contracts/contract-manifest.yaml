version: 0.9
product: fe-reader
strict_contracts:
  invariant: OperationIntent -> PatchPlan -> TransactionJournal -> Apply -> Verify -> Receipt
  hard_gates:
    - architecture_boundary
    - schema_validation
    - operation_transaction
    - cli_json_contract
    - security_policy_default_deny
    - sidecar_migration_no_data_loss
    - public_api_no_break_without_version
    - automation_mutation_requires_approval
  advisory_until_baseline:
    - performance_budget
    - visual_regression
    - differential_oracles
    - fuzz_smoke
    - packaging_registry_manifests
surfaces:
  rust_core:
    stability: preview
    test: cargo nextest run -p fe_reader_core
    snapshots:
      - contracts/snapshots/rust-public-api/fe_reader_core.operation_intent.preview.json
      - contracts/snapshots/rust-public-api/fe_reader_core.patch_plan.preview.json
  cli:
    stability: preview
    schema: schemas/pdf-document-summary.schema.json
  uniffi:
    stability: preview
    snapshot: contracts/snapshots/uniffi/fe_reader_uniffi.facade.json
    mutation_policy: read_only_or_plan_only
  c_abi:
    stability: preview
    snapshot: contracts/snapshots/c-abi/fe_reader_c_abi.facade.json
    mutation_policy: read_only_or_plan_only
  dotnet_wrapper:
    stability: preview
    snapshot: contracts/snapshots/dotnet/FeReader.Native.facade.json
    mutation_policy: read_only_or_plan_only
    package: packaging/nuget/FeReader.Native/FeReader.Native.csproj
  mobile_smoke_bindings:
    stability: preview
    snapshot: contracts/snapshots/mobile/FeReader.MobileSmoke.facade.json
    source_snapshot: contracts/snapshots/uniffi/fe_reader_uniffi.facade.json
    mutation_policy: read_only_or_plan_only
    platforms:
      - android
      - ios
    languages:
      - kotlin
      - swift
    supports_apply: false
    supports_plan_only: true
  mcp:
    stability: planned
    schema_dir: contracts/mcp
  plugin_abi:
    stability: planned
    schema: schemas/plugin-manifest.schema.json
  platform_automation:
    stability: planned
    paths:
      - contracts/platform/windows-com/FeReaderAutomation.idl
      - contracts/platform/macos-applescript/FeReader.sdef
      - contracts/platform/linux-dbus/org.fereader.FeReader1.xml
      - contracts/platform/android-intents/AndroidManifest.contract.xml
      - contracts/platform/ios-appintents/FeReaderAppIntents.swift
